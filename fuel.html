<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-3123996159086312">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3123996159086312"
     crossorigin="anonymous"></script>
  <title>Fuel Cost Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .result {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      line-height: 1.6;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }

    * {
  box-sizing: border-box;
}
  </style>
</head>

<body>

<div class="container">
  <h1>⛽ Fuel Cost Calculator</h1>

  <label>Distance (km)</label>
  <input type="number" id="distance" placeholder="e.g. 50">

  <label>Fuel Efficiency (km per liter)</label>
  <input type="number" id="efficiency" placeholder="e.g. 12">

  <label>Fuel Price per Liter (₱)</label>
  <input type="number" id="price" placeholder="e.g. 65">

  <button onclick="calculateFuel()">Calculate</button>

  <div class="result" id="result" style="display:none;"></div>

  <a href="index.html">← Back to Home</a>
</div>

<script>
function calculateFuel() {
  let distance = parseFloat(document.getElementById("distance").value);
  let efficiency = parseFloat(document.getElementById("efficiency").value);
  let price = parseFloat(document.getElementById("price").value);

  if (isNaN(distance) || isNaN(efficiency) || isNaN(price) || efficiency <= 0) {
    alert("Please enter valid values.");
    return;
  }

  let litersNeeded = distance / efficiency;
  let totalCost = litersNeeded * price;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <strong>Fuel Needed:</strong> ${litersNeeded.toFixed(2)} L<br>
    <strong>Total Cost:</strong> ₱${totalCost.toFixed(2)}
  `;
}
</script>

</body>
</html>
