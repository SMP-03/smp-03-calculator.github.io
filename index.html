  <title>Calculator Hub</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 30px 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      color: #cbd5e1;
    }

    .container {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
  width: 90%;
  max-width: 1000px;
  margin: 20px 0 50px;
}
@media (max-width: 768px) {
  .container {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 480px) {
  .container {
    grid-template-columns: 1fr;
  }
}

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      transition: 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: white;
      display: block;
    }

    .card:hover {
      background: #334155;
      transform: scale(1.03);
    }

    footer {
      margin-bottom: 20px;
      color: #64748b;
      font-size: 14px;
    }

    * {
  box-sizing: border-box;
}
  </style>
