<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-adsense-account" content="ca-pub-3123996159086312">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3123996159086312"
     crossorigin="anonymous"></script>
  <title>Crypto Profit Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 25px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
      color: #cbd5e1;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 6px;
      outline: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: #f59e0b;
      border: none;
      border-radius: 6px;
      color: #0f172a;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #d97706;
    }

    .result {
      margin-top: 20px;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      line-height: 1.6;
    }

    a {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #93c5fd;
      text-decoration: none;
      font-size: 14px;
    }

    * {
  box-sizing: border-box;
}
  </style>
</head>

<body>

<div class="container">
  <h1>₿ Crypto Profit Calculator</h1>

  <label>Coin Name (optional)</label>
  <input type="text" id="coin" placeholder="e.g. Bitcoin">

  <label>Buy Price (₱ or $)</label>
  <input type="number" id="buyPrice" placeholder="e.g. 20000">

  <label>Sell Price (₱ or $)</label>
  <input type="number" id="sellPrice" placeholder="e.g. 25000">

  <label>Amount (coins)</label>
  <input type="number" id="amount" placeholder="e.g. 0.5">

  <button onclick="calculateCrypto()">Calculate</button>

  <div class="result" id="result" style="display:none;"></div>

  <a href="index.html">← Back to Home</a>
</div>

<script>
function calculateCrypto() {
  let coin = document.getElementById("coin").value || "Crypto";
  let buy = parseFloat(document.getElementById("buyPrice").value);
  let sell = parseFloat(document.getElementById("sellPrice").value);
  let amount = parseFloat(document.getElementById("amount").value);

  if (isNaN(buy) || isNaN(sell) || isNaN(amount)) {
    alert("Please enter valid values.");
    return;
  }

  let cost = buy * amount;
  let revenue = sell * amount;
  let profit = revenue - cost;
  let percent = (profit / cost) * 100;

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML = `
    <strong>${coin} Result</strong><br><br>
    Investment: ${cost.toFixed(2)}<br>
    Return: ${revenue.toFixed(2)}<br>
    Profit/Loss: <span style="color:${profit >= 0 ? '#22c55e' : '#ef4444'}">
      ${profit.toFixed(2)}
    </span><br>
    ROI: ${percent.toFixed(2)}%
  `;
}
</script>

</body>
</html>
